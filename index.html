const tabs=document.getElementById('tabs');
const cont=document.getElementById('cont');
const checked=new Set();

function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.getElementById('tab-'+id).classList.add('on');
  if(id==='shop') renderShop();
}

function togglePanel(id){
  const p=document.getElementById(id),b=document.querySelector(`[data-pid="${id}"]`);
  const o=p.classList.toggle('on');
  if(b) b.textContent=o?'Masquer':'Recette';
}
function toggleSauce(id){
  const p=document.getElementById(id),b=document.querySelector(`[data-ssid="${id}"]`);
  const o=p.classList.toggle('on');
  if(b) b.textContent=o?'Masquer':'Sauces';
}
function toggleSwap(id){
  const p=document.getElementById(id),b=document.querySelector(`[data-swid="${id}"]`);
  const o=p.classList.toggle('on');
  if(b) b.textContent=o?'Masquer':'Substitutions';
}

DAYS.forEach((day,di)=>{
  const tab=document.createElement('button');
  tab.className='tab';tab.id='tab-day'+di;
  tab.textContent=day.n;tab.onclick=()=>showView('day'+di);
  tabs.appendChild(tab);
  const view=document.createElement('div');view.className='view';view.id='day'+di;
  const dl=document.createElement('div');dl.className='day-label';dl.textContent=day.label;view.appendChild(dl);
  const grid=document.createElement('div');grid.className='meals';
  let tP=0,tC=0,tF=0,tK=0;
  day.meals.forEach((m,mi)=>{
    tP+=m.p;tC+=m.c;tF+=m.f;tK+=m.k;
    const rid='r'+di+'_'+mi,sauid='sa'+di+'_'+mi,swid='sw'+di+'_'+mi;
    const card=document.createElement('div');
    let cls='card';if(m.bk)cls+=' bk';if(m.dinner2)cls+=' dinner2';
    card.className=cls;
    let h='<div class="card-top"><div class="mrow"><span class="mlabel">'+m.l+'</span><div class="badges">';
    if(m.nocook)h+='<span class="pill pbadge">0-cook</span>';
    if(m.dinner2)h+='<span class="pill p2">×2 pers.</span>';
    h+='</div></div>';
    h+='<div class="mname">'+m.n+'</div><div class="mdesc">'+m.d+'</div>';
    h+='<div class="macros"><span class="mac mp">'+m.p+'g prot.</span><span class="mac mc">'+m.c+'g gluc.</span><span class="mac mf">'+m.f+'g lip.</span><span class="mac mk">'+m.k+' kcal</span></div>';
    h+='<div class="pill-row">';
    if(m.ing&&m.ing.length)h+=`<button class="pill pr" data-pid="${rid}" onclick="togglePanel('${rid}')">Recette</button>`;
    if(m.sauces&&m.sauces.length)h+=`<button class="pill psauce" data-ssid="${sauid}" onclick="toggleSauce('${sauid}')">Sauces</button>`;
    if(m.sw&&m.sw.length)h+=`<button class="pill ps" data-swid="${swid}" onclick="toggleSwap('${swid}')">Substitutions</button>`;
    h+='</div></div>';
    if(m.ing&&m.ing.length){
      h+=`<div class="panel" id="${rid}"><div class="ptitle">Ingrédients</div><ul class="ilist">${m.ing.map(i=>'<li>'+i+'</li>').join('')}</ul>`;
      h+=`<div class="ptitle">Étapes</div><ol class="slist">${m.steps.map((s,si)=>`<li><span class="snum">${si+1}</span>${s}</li>`).join('')}</ol></div>`;
    }
    if(m.sauces&&m.sauces.length){
      h+=`<div class="panel" id="${sauid}"><div class="ptitle">Options de sauce</div><div class="sauce-list">${m.sauces.map(s=>`<div class="sauce-item"><div class="sauce-name">${s.n}</div><div class="sauce-desc">${s.d}</div></div>`).join('')}</div></div>`;
    }
    if(m.sw&&m.sw.length){
      h+=`<div class="panel" id="${swid}"><div class="ptitle">Substitutions</div><div class="swaplist">${m.sw.map(s=>'<div class="swapitem">'+s+'</div>').join('')}</div></div>`;
    }
    card.innerHTML=h;grid.appendChild(card);
  });
  view.appendChild(grid);
  view.innerHTML+=`<div class="totals"><div class="ti"><span class="tl">Protéines</span><span class="tv">${tP}g</span></div><div class="ti"><span class="tl">Glucides</span><span class="tv">${tC}g</span></div><div class="ti"><span class="tl">Lipides</span><span class="tv">${tF}g</span></div><div class="ti"><span class="tl">Kcal</span><span class="tv">${tK}</span></div></div>`;
  cont.appendChild(view);
});

let bh='<div class="tip">Dimanche (~65 min, surtout temps de cuisson) + mercredi restock overnight oats (~10 min). Tout ce qui est tagué "from batch" dans le plan vient d\'ici.</div>';
BATCH.forEach((b,bi)=>{
  bh+=`<div class="bc"><div class="bct">${b.t}</div><div class="bcd">${b.d}</div><ol class="bsteps">${b.steps.map((s,i)=>`<li><span class="snum">${i+1}</span>${s}</li>`).join('')}</ol><div class="tags">${b.u.map(u=>'<span class="utag">'+u+'</span>').join('')}</div></div>`;
});
bv.innerHTML=bh;cont.appendChild(bv);

// Stock tab
const stTab=document.createElement('button');
stTab.className='tab t-stock';stTab.id='tab-stock';stTab.textContent='Stock';stTab.onclick=()=>showView('stock');
tabs.appendChild(stTab);
const stv=document.createElement('div');stv.className='view';stv.id='stock';

function buildStockView(){
  const cats=[...new Set(Object.values(STOCK).map(v=>v[3]))];
  let h='<div class="stock-hdr">Ajuste ton stock en temps réel avec les boutons + / −. La liste de courses se met à jour automatiquement selon les niveaux.</div>';
  cats.forEach(cat=>{
    h+=`<div class="scat-title">${cat}</div>`;
    Object.entries(STOCK).forEach(([key,v])=>{
      if(v[3]!==cat) return;
      const [cur,max,unit,,name]=v;
      const pct=Math.min(100,Math.round(cur/max*100));
      const barCol=cur<=0?'#e5e5ea':pct<=25?'#EF4444':pct<=50?'#F59E0B':'#22C55E';
      const valCls=cur<=0?'empty':pct<=25?'low':'';
      h+=`<div class="stock-row">
        <div class="stock-left">
          <div class="stock-name">${name}</div>
          <div class="prog-mini"><div class="prog-mini-fill" id="bar_${key}" style="width:${pct}%;background:${barCol}"></div></div>
        </div>
        <div class="stock-ctrl">
          <button class="sc-btn" onclick="adjStock('${key}',-1)">−</button>
          <div style="text-align:center;min-width:44px">
            <div class="sc-val ${valCls}" id="val_${key}">${cur}</div>
            <div class="sc-unit">${unit}</div>
          </div>
          <button class="sc-btn" onclick="adjStock('${key}',1)">+</button>
        </div>
      </div>`;
    });
  });
  stv.innerHTML=h;
}

function adjStock(key,dir){
  const step=STEP[key]||1;
  STOCK[key][0]=Math.max(0,STOCK[key][0]+(dir*step));
  const [cur,max,unit]=STOCK[key];
  const pct=Math.min(100,Math.round(cur/max*100));
  const barCol=cur<=0?'#e5e5ea':pct<=25?'#EF4444':pct<=50?'#F59E0B':'#22C55E';
  const valCls=cur<=0?'empty':pct<=25?'low':'';
  const ve=document.getElementById('val_'+key);
  const be=document.getElementById('bar_'+key);
  if(ve){ve.textContent=cur;ve.className='sc-val '+valCls;}
  if(be){be.style.width=pct+'%';be.style.background=barCol;}
  if(document.getElementById('shop').classList.contains('on')) renderShop();
}
buildStockView();
cont.appendChild(stv);

// Shop tab
const shTab=document.createElement('button');
shTab.className='tab t-shop';shTab.id='tab-shop';shTab.textContent='Courses';shTab.onclick=()=>showView('shop');
tabs.appendChild(shTab);
const shv=document.createElement('div');shv.className='view';shv.id='shop';
cont.appendChild(shv);

function renderShop(){
  const total=SHOPPING.reduce((a,c)=>a+c.items.length,0);
  const done=checked.size;
  const pct=total?Math.round(done/total*100):0;

  let urgentItems=[],soonItems=[];
  SHOPPING.forEach(cat=>cat.items.forEach(item=>{
    if(!item.key||!STOCK[item.key]) return;
    const [cur,max]=STOCK[item.key];
    const p=cur/max;
    if(p<=0) urgentItems.push(item.n);
    else if(p<=0.25) urgentItems.push(item.n);
    else if(p<=0.5) soonItems.push(item.n);
  }));

  let h=`<div class="prog-row"><div class="prog-bar"><div class="prog-fill" id="pfill" style="width:${pct}%"></div></div><span class="prog-txt">${done}/${total} cochés</span><button class="clr-btn" onclick="clearAll()">Effacer</button></div>`;

  if(urgentItems.length===0&&soonItems.length===0){
    h+='<div class="shop-ok">✓ Tous les stocks sont suffisants. Rien d\'urgent à acheter.</div>';
  } else {
    if(urgentItems.length) h+=`<div class="shop-alert"><strong>⚠ À acheter en urgence :</strong> ${urgentItems.join(', ')}</div>`;
    if(soonItems.length) h+=`<div class="shop-alert" style="background:#FFFBEB;border-color:#FDE68A;color:#92400E"><strong>Bientôt en rupture :</strong> ${soonItems.join(', ')}</div>`;
  }

  SHOPPING.forEach((cat,ci)=>{
    h+=`<div class="shop-cat-title">${cat.cat}</div>`;
    cat.items.forEach((item,ii)=>{
      const k=`${ci}_${ii}`;
      let badge='';
      if(item.key&&STOCK[item.key]){
        const [cur,max]=STOCK[item.key];
        const p=cur/max;
        if(p<=0.25) badge='<span class="badge-urgent">urgent</span>';
        else if(p<=0.5) badge='<span class="badge-soon">bientôt</span>';
      }
      const ck=checked.has(k);
      h+=`<div class="sitem" onclick="toggleCheck('${k}')">
        <div class="scb${ck?' on':''}" id="cb_${k}"></div>
        <span class="stxt${ck?' done':''}" id="tx_${k}">${item.n}</span>
        <div style="display:flex;align-items:center;gap:4px">${badge}<span class="sqty">${item.q}</span></div>
      </div>`;
    });
  });
  shv.innerHTML=h;
}

function toggleCheck(k){
  if(checked.has(k))checked.delete(k);else checked.add(k);
  renderShop();
}
function clearAll(){checked.clear();renderShop();}

showView('day0');
</script>
</body>
</html>
