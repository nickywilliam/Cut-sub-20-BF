const checked=new Set();
const tabs=document.getElementById('tabs');
const cont=document.getElementById('cont');

function togglePanel(id){
  const p=document.getElementById(id);
  const btn=document.querySelector('[data-panel="'+id+'"]');
  const isOpen=p.classList.contains('on');
  p.classList.toggle('on',!isOpen);
  if(btn) btn.textContent=isOpen?'Voir la recette':'Masquer';
}

function toggleSwap(id){
  const p=document.getElementById(id);
  const btn=document.querySelector('[data-swap="'+id+'"]');
  const isOpen=p.classList.contains('on');
  p.classList.toggle('on',!isOpen);
  if(btn) btn.textContent=isOpen?'Substitutions':'Masquer';
}

function toggleCheck(key,el,txtEl){
  if(checked.has(key)){checked.delete(key);}else{checked.add(key);}
  el.classList.toggle('on',checked.has(key));
  txtEl.classList.toggle('done',checked.has(key));
  updateProgress();
}

function updateProgress(){
  const total=SHOP.reduce((a,c)=>a+c.items.length,0);
  const done=checked.size;
  const pct=total?Math.round(done/total*100):0;
  const fill=document.getElementById('pfill');
  const txt=document.getElementById('ptxt');
  if(fill) fill.style.width=pct+'%';
  if(txt) txt.textContent=done+'/'+total+' articles';
}

function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.getElementById('tab-'+id).classList.add('on');
}

D.forEach((day,di)=>{
  const tab=document.createElement('button');
  tab.className='tab';tab.id='tab-day'+di;
  tab.textContent=day.n;
  tab.onclick=()=>showView('day'+di);
  tabs.appendChild(tab);

  const view=document.createElement('div');
  view.className='view';view.id='day'+di;
  const grid=document.createElement('div');
  grid.className='meals';

  let tP=0,tC=0,tF=0,tK=0;
  day.meals.forEach((m,mi)=>{
    if(m.l!=='Batch cook'){tP+=m.p;tC+=m.c;tF+=m.f;tK+=m.k;}
    const rid='r'+di+'_'+mi,sid='s'+di+'_'+mi;
    const badge=m.b==='nocook'?'<span class="pill pbadge">0-cook</span>':m.b==='batch'?'<span class="pill pbatch">from batch</span>':m.pr?'<span class="pill pprep">'+m.pr+'</span>':'';
    const hasR=m.ing&&m.ing.length>0;
    const hasS=m.sw&&m.sw.length>0;
    const isBK=m.l==='Petit-dej';
    const card=document.createElement('div');
    card.className='card'+(isBK?' bk':'');
    let html='<div class="card-top"><div class="row"><span class="mlabel">'+m.l+'</span><div style="display:flex;gap:5px">'+badge+'</div></div>';
    html+='<div class="mname">'+m.n+'</div><div class="mdesc">'+m.d+'</div>';
    if(m.l!=='Batch cook') html+='<div class="macros"><span class="mac mp">Protéines '+m.p+'g</span><span class="mac mc">Glucides '+m.c+'g</span><span class="mac mf">Lipides '+m.f+'g</span><span class="mac mk">'+m.k+' kcal</span></div>';
    html+='<div class="pill-row">';
    if(hasR) html+='<button class="pill precipe" data-panel="'+rid+'" onclick="togglePanel(\''+rid+'\')">Voir la recette</button>';
    if(hasS) html+='<button class="pill pswap" data-swap="'+sid+'" onclick="toggleSwap(\''+sid+'\')">Substitutions</button>';
    html+='</div></div>';
    if(hasR){
      html+='<div class="panel" id="'+rid+'"><div class="ptitle">Ingrédients</div><ul class="ilist">'+m.ing.map(i=>'<li>'+i+'</li>').join('')+'</ul>';
      html+='<div class="ptitle">Étapes</div><ol class="slist">'+m.steps.map((s,si)=>'<li><span class="snum">'+(si+1)+'</span>'+s+'</li>').join('')+'</ol></div>';
    }
    if(hasS){
      html+='<div class="panel" id="'+sid+'"><div class="ptitle">Options de substitution</div><div class="swaplist">'+m.sw.map(s=>'<div class="swapitem">'+s+'</div>').join('')+'</div></div>';
    }
    card.innerHTML=html;
    grid.appendChild(card);
  });

  view.appendChild(grid);
  if(tK>0) view.innerHTML+=`<div class="totals"><div class="ti"><span class="tl">Protéines</span><span class="tv">${tP}g</span></div><div class="ti"><span class="tl">Glucides</span><span class="tv">${tC}g</span></div><div class="ti"><span class="tl">Lipides</span><span class="tv">${tF}g</span></div><div class="ti"><span class="tl">Total</span><span class="tv">${tK} kcal</span></div></div>`;
  cont.appendChild(view);
});
