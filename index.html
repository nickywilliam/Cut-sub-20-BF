<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Plan Nutrition — Mike</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --bg2: #161719;
  --bg3: #1e1f23;
  --bg4: #26272d;
  --border: #2a2b31;
  --border2: #333440;
  --text: #f0f0ec;
  --text2: #9b9da8;
  --text3: #5c5e6a;
  --accent: #c8f063;
  --accent2: #a8d44a;
  --orange: #f07a3a;
  --blue: #5ba4f5;
  --purple: #9b72f5;
  --red: #f05c5c;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

/* ── HEADER ── */
.site-header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(14,15,17,.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 32px; height: 32px; background: var(--accent);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
}
.logo-mark svg { width: 18px; height: 18px; }
.logo-text { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--text); }
.header-meta { font-size: 12px; color: var(--text3); }
.header-pill {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--accent); font-weight: 500;
}

/* ── NAV TABS ── */
.nav-outer {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; z-index: 100;
}
.nav-tabs {
  display: flex; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding: 0 12px;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  flex-shrink: 0; padding: 14px 16px;
  font-size: 13px; font-weight: 500; color: var(--text3);
  border: none; background: transparent; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all .15s;
  white-space: nowrap;
}
.nav-tab:hover { color: var(--text2); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-tab.special { color: var(--orange); }
.nav-tab.special.active { color: var(--orange); border-bottom-color: var(--orange); }

/* ── VIEWS ── */
.view { display: none; padding: 20px; max-width: 720px; margin: 0 auto; }
.view.active { display: block; }

/* ── DAY HEADER ── */
.day-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.day-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); }
.day-subtitle { font-size: 12px; color: var(--text3); margin-top: 2px; }
.day-totals-bar {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end;
}
.dbar-pill {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 500;
}
.dbar-pill.p { color: var(--blue); }
.dbar-pill.c { color: var(--accent); }
.dbar-pill.f { color: var(--orange); }
.dbar-pill.k { color: var(--text2); }

/* ── MEAL CARDS ── */
.meals-stack { display: flex; flex-direction: column; gap: 12px; }

.meal-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  transition: border-color .15s;
}
.meal-card:hover { border-color: var(--border2); }
.meal-card.is-bk { border-left: 3px solid var(--accent); border-radius: 0 var(--radius) var(--radius) 0; }
.meal-card.is-dinner { border-left: 3px solid var(--orange); border-radius: 0 var(--radius) var(--radius) 0; }

.meal-top { padding: 16px 18px; cursor: pointer; user-select: none; -webkit-user-select: none; }
.meal-top:active { background: var(--bg3); }

.meal-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.meal-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); }
.meal-badges { display: flex; gap: 5px; align-items: center; }
.badge {
  font-size: 10px; font-weight: 500; padding: 2px 8px;
  border-radius: 20px; border: 1px solid; white-space: nowrap;
}
.badge-nocook { color: var(--accent); border-color: var(--accent); background: rgba(200,240,99,.08); }
.badge-2p { color: var(--orange); border-color: var(--orange); background: rgba(240,122,58,.08); }

.meal-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 5px; line-height: 1.3; }
.meal-desc { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; }

.macro-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.macro-chip {
  display: flex; flex-direction: column; align-items: center;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 6px 10px; min-width: 56px;
}
.macro-chip .val { font-size: 14px; font-weight: 600; line-height: 1; }
.macro-chip .lbl { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-top: 3px; }
.mc-p .val { color: var(--blue); }
.mc-c .val { color: var(--accent); }
.mc-f .val { color: var(--orange); }
.mc-k .val { color: var(--text2); }
.mc-fiber .val { color: var(--purple); }

.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-expand {
  font-size: 11px; font-weight: 500; padding: 6px 12px;
  border-radius: 20px; border: 1px solid var(--border2);
  background: transparent; cursor: pointer; color: var(--text2);
  transition: all .12s;
}
.btn-expand:hover { background: var(--bg4); color: var(--text); }
.btn-expand.active { background: var(--bg4); color: var(--text); border-color: var(--border2); }
.btn-recipe { color: var(--accent); border-color: rgba(200,240,99,.3); }
.btn-recipe:hover,.btn-recipe.active { background: rgba(200,240,99,.08); color: var(--accent); border-color: var(--accent); }
.btn-sauce { color: var(--blue); border-color: rgba(91,164,245,.3); }
.btn-sauce:hover,.btn-sauce.active { background: rgba(91,164,245,.08); color: var(--blue); border-color: var(--blue); }

/* ── PANELS ── */
.panel { display: none; border-top: 1px solid var(--border); }
.panel.open { display: block; }

.panel-inner { padding: 16px 18px; }
.panel-section { margin-bottom: 18px; }
.panel-section:last-child { margin-bottom: 0; }
.panel-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .1em; color: var(--text3); margin-bottom: 10px;
}

.ing-list { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
@media (max-width: 480px) { .ing-list { grid-template-columns: 1fr; } }
.ing-item {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.ing-name { font-size: 12px; color: var(--text2); }
.ing-qty { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; margin-left: 8px; }

.steps-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.step-item { display: flex; gap: 10px; align-items: flex-start; }
.step-num {
  flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
  background: var(--bg4); border: 1px solid var(--border2);
  font-size: 10px; font-weight: 700; color: var(--accent);
  display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
.step-txt { font-size: 12px; color: var(--text2); line-height: 1.65; }

.sauce-cards { display: flex; flex-direction: column; gap: 8px; }
.sauce-card {
  background: var(--bg3); border: 1px solid rgba(91,164,245,.2);
  border-radius: var(--radius-sm); padding: 10px 12px;
}
.sauce-card-name { font-size: 12px; font-weight: 600; color: var(--blue); margin-bottom: 4px; }
.sauce-card-how { font-size: 11px; color: var(--text2); line-height: 1.6; }
.sauce-macros { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
.sauce-macro { font-size: 10px; color: var(--text3); }

/* ── SHOPPING VIEW ── */
.shop-header { margin-bottom: 20px; }
.shop-title { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 4px; }
.shop-sub { font-size: 12px; color: var(--text3); }

.shop-progress-bar {
  height: 4px; background: var(--bg4); border-radius: 2px;
  margin-bottom: 20px; overflow: hidden;
}
.shop-progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width .3s ease;
}

.shop-section { margin-bottom: 24px; }
.shop-section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .12em; color: var(--text3); padding: 8px 0 6px;
  border-bottom: 1px solid var(--border); margin-bottom: 8px;
}

.shop-items { display: flex; flex-direction: column; gap: 4px; }
.shop-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer; transition: all .12s;
  min-height: 48px;
}
.shop-item:active { background: var(--bg3); }
.shop-item.checked { opacity: .45; }

.shop-cb {
  width: 20px; height: 20px; border-radius: 5px;
  border: 1.5px solid var(--border2); background: transparent;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.shop-item.checked .shop-cb {
  background: var(--accent); border-color: var(--accent);
}
.shop-cb-check { display: none; }
.shop-item.checked .shop-cb-check { display: block; }

.shop-item-name { font-size: 13px; color: var(--text); flex: 1; line-height: 1.3; }
.shop-item.checked .shop-item-name { text-decoration: line-through; color: var(--text3); }

.shop-item-right { display: flex; align-items: center; gap: 8px; }
.shop-item-qty { font-size: 12px; font-weight: 600; color: var(--accent); white-space: nowrap; }
.shop-item-meals { font-size: 10px; color: var(--text3); white-space: nowrap; }

.shop-count-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.shop-count-txt { font-size: 12px; color: var(--text3); }
.shop-clear { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.shop-clear:hover { color: var(--text2); background: var(--bg3); }

/* ── BATCH VIEW ── */
.batch-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.batch-title { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 4px; }
.batch-sub { font-size: 12px; color: var(--text3); line-height: 1.6; }

.batch-tip {
  background: rgba(200,240,99,.06); border: 1px solid rgba(200,240,99,.2);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px;
  font-size: 12px; color: var(--text2); line-height: 1.7;
}

.batch-session { margin-bottom: 28px; }
.batch-session-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .12em;
  color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.batch-session-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.batch-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px;
}
.batch-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; gap: 10px; }
.batch-card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
.batch-card-time {
  font-size: 10px; font-weight: 600; color: var(--orange);
  background: rgba(240,122,58,.1); border: 1px solid rgba(240,122,58,.2);
  border-radius: 20px; padding: 2px 8px; white-space: nowrap; flex-shrink: 0;
}
.batch-card-sub { font-size: 11px; color: var(--text3); margin-bottom: 12px; }

.batch-steps { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.batch-step { display: flex; gap: 10px; align-items: flex-start; }
.batch-step-num {
  flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
  background: var(--bg4); border: 1px solid var(--border2);
  font-size: 9px; font-weight: 700; color: var(--accent);
  display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
.batch-step-txt { font-size: 12px; color: var(--text2); line-height: 1.65; }

.batch-uses { display: flex; gap: 5px; flex-wrap: wrap; }
.batch-use-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 20px;
  background: rgba(155,114,245,.1); border: 1px solid rgba(155,114,245,.25); color: var(--purple);
}

/* ── GOALS VIEW ── */
.goals-section { margin-bottom: 28px; }
.goals-section-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 14px; }
.goal-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px;
}
.goal-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 6px; }
.goal-value { font-size: 22px; font-weight: 600; color: var(--accent); line-height: 1.1; }
.goal-unit { font-size: 12px; color: var(--text3); }
.goal-note { font-size: 12px; color: var(--text2); margin-top: 6px; line-height: 1.6; }
.goals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 400px) { .goals-grid { grid-template-columns: 1fr; } }
.hydration-timeline { display: flex; flex-direction: column; gap: 8px; }
.hydra-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg3); border-radius: var(--radius-sm); padding: 10px 12px;
}
.hydra-time { font-size: 11px; font-weight: 600; color: var(--blue); min-width: 90px; }
.hydra-action { font-size: 12px; color: var(--text2); }
.hydra-qty { font-size: 12px; font-weight: 600; color: var(--text); margin-left: auto; white-space: nowrap; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
</style>
</head>

  <div class="logo">

<div class="nav-outer">

</div>

    { cat: 'Épices & assaisonnements', name: 'Thym séché', qty: 'si manquant', meals: 'Dîner J2 J4' },

}

const SHOPPING = generateShoppingList();

// ══════════════════════════════════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════════════════════════════════

const navTabs = document.getElementById('navTabs');
const viewContainer = document.getElementById('viewContainer');
const checkedItems = new Set();

function getMealTypeColor(type) {
  if (type === 'breakfast') return 'var(--accent)';
  if (type === 'lunch') return 'var(--blue)';
  if (type === 'snack') return 'var(--purple)';
  if (type === 'dinner') return 'var(--orange)';
  return 'var(--text2)';
}

function computeDayTotals(meals) {
  return meals.reduce((acc, m) => {
    acc.p += m.macros.p; acc.c += m.macros.c;
    acc.f += m.macros.f; acc.k += m.macros.k;
    return acc;
  }, { p: 0, c: 0, f: 0, k: 0 });
}

function buildDayView(day) {
  const div = document.createElement('div');
  div.className = 'view';
  div.id = 'view-' + day.id;

  const totals = computeDayTotals(day.meals);

  div.innerHTML = `
    <div class="day-header">
      <div>
        <div class="day-title">${day.title}</div>
        <div class="day-subtitle">${day.subtitle} · ${day.meals.length} repas</div>
      </div>
      <div class="day-totals-bar">
        <span class="dbar-pill p">${totals.p}g prot.</span>
        <span class="dbar-pill c">${totals.c}g gluc.</span>
        <span class="dbar-pill f">${totals.f}g lip.</span>
        <span class="dbar-pill k">${totals.k} kcal</span>
      </div>
    </div>
    <div class="meals-stack" id="meals-${day.id}"></div>
  `;

  const stack = div.querySelector(`#meals-${day.id}`);

  day.meals.forEach((meal, mi) => {
    const card = document.createElement('div');
    let cardClass = 'meal-card';
    if (meal.type === 'breakfast') cardClass += ' is-bk';
    if (meal.dinner2) cardClass += ' is-dinner';
    card.className = cardClass;

    const rid = `rec-${day.id}-${mi}`;
    const sid = `sau-${day.id}-${mi}`;

    const accentColor = getMealTypeColor(meal.type);
    const fiberChip = meal.macros.fiber ? `<div class="macro-chip mc-fiber"><div class="val">${meal.macros.fiber}g</div><div class="lbl">Fibres</div></div>` : '';

    const badgesHtml = `
      ${meal.nocook ? '<span class="badge badge-nocook">0-cook</span>' : ''}
      ${meal.dinner2 ? '<span class="badge badge-2p">×2 pers.</span>' : ''}
    `;

    const sauceBtnHtml = meal.sauces && meal.sauces.length > 0
      ? `<button class="btn-expand btn-sauce" onclick="togglePanel('${sid}', this)">Sauces (${meal.sauces.length})</button>` : '';

    card.innerHTML = `
      <div class="meal-top">
        <div class="meal-meta">
          <span class="meal-label" style="color:${accentColor}">${meal.label}</span>
          <div class="meal-badges">${badgesHtml}</div>
        </div>
        <div class="meal-name">${meal.name}</div>
        <div class="meal-desc">${meal.desc}</div>
        <div class="macro-row">
          <div class="macro-chip mc-p"><div class="val">${meal.macros.p}g</div><div class="lbl">Protéines</div></div>
          <div class="macro-chip mc-c"><div class="val">${meal.macros.c}g</div><div class="lbl">Glucides</div></div>
          <div class="macro-chip mc-f"><div class="val">${meal.macros.f}g</div><div class="lbl">Lipides</div></div>
          <div class="macro-chip mc-k"><div class="val">${meal.macros.k}</div><div class="lbl">kcal</div></div>
          ${fiberChip}
        </div>
        <div class="btn-row">
          <button class="btn-expand btn-recipe" onclick="togglePanel('${rid}', this)">Recette complète</button>
          ${sauceBtnHtml}
        </div>
      </div>
      <div class="panel" id="${rid}">
        <div class="panel-inner">
          <div class="panel-section">
            <div class="panel-title">Ingrédients</div>
            <ul class="ing-list">
              ${meal.ingredients.map(ing => `
                <li class="ing-item">
                  <span class="ing-name">${ing.name}</span>
                  <span class="ing-qty">${ing.qty}</span>
                </li>`).join('')}
            </ul>
          </div>
          <div class="panel-section">
            <div class="panel-title">Étapes détaillées</div>
            <ol class="steps-list">
              ${meal.steps.map((step, si) => `
                <li class="step-item">
                  <span class="step-num">${si + 1}</span>
                  <span class="step-txt">${step}</span>
                </li>`).join('')}
            </ol>
          </div>
        </div>
      </div>
      ${meal.sauces && meal.sauces.length > 0 ? `
      <div class="panel" id="${sid}">
        <div class="panel-inner">
          <div class="panel-section">
            <div class="panel-title">Options de sauce — choisir 1</div>
            <div class="sauce-cards">
              ${meal.sauces.map(s => `
                <div class="sauce-card">
                  <div class="sauce-card-name">${s.name}</div>
                  <div class="sauce-card-how">${s.how}</div>
                  <div class="sauce-macros"><span class="sauce-macro">${s.macros}</span></div>
                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>` : ''}
    `;

    stack.appendChild(card);
  });

  return div;
}

function togglePanel(id, btn) {
  const p = document.getElementById(id);
  const isOpen = p.classList.contains('open');
  p.classList.toggle('open', !isOpen);
  if (btn) btn.classList.toggle('active', !isOpen);
}

function buildShopView() {
  const div = document.createElement('div');
  div.className = 'view';
  div.id = 'view-shop';

  const cats = [...new Set(SHOPPING.map(i => i.cat))];

  div.innerHTML = `
    <div class="shop-header">
      <div class="shop-title">Liste de courses</div>
      <div class="shop-sub">Tous les articles correspondent à un repas du plan — rien de superflu.</div>
    </div>
    <div class="shop-count-bar">
      <span class="shop-count-txt" id="shopCountTxt">0 / ${SHOPPING.length} cochés</span>
      <button class="shop-clear" onclick="clearShop()">Tout décocher</button>
    </div>
    <div class="shop-progress-bar"><div class="shop-progress-fill" id="shopProgFill" style="width:0%"></div></div>
    <div id="shopCats"></div>
  `;

  const catsDiv = div.querySelector('#shopCats');

  cats.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'shop-section';
    const items = SHOPPING.filter(i => i.cat === cat);
    sec.innerHTML = `
      <div class="shop-section-title">${cat}</div>
      <div class="shop-items">
        ${items.map((item, idx) => {
          const key = cat + '_' + idx;
          return `
            <div class="shop-item" id="si-${key}" onclick="toggleShopItem('${key}')">
              <div class="shop-cb">
                <svg class="shop-cb-check" width="12" height="9" viewBox="0 0 12 9" fill="none">
                  <path d="M1 4L4.5 7.5L11 1" stroke="#0e0f11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <span class="shop-item-name">${item.name}</span>
              <div class="shop-item-right">
                <span class="shop-item-qty">${item.qty}</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    catsDiv.appendChild(sec);
  });

  return div;
}

function toggleShopItem(key) {
  if (checkedItems.has(key)) checkedItems.delete(key);
  else checkedItems.add(key);
  const el = document.getElementById('si-' + key);
  if (el) el.classList.toggle('checked', checkedItems.has(key));
  updateShopProgress();
}

function clearShop() {
  checkedItems.clear();
  document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('checked'));
  updateShopProgress();
}

function updateShopProgress() {
  const pct = Math.round(checkedItems.size / SHOPPING.length * 100);
  const fill = document.getElementById('shopProgFill');
  const txt = document.getElementById('shopCountTxt');
  if (fill) fill.style.width = pct + '%';
  if (txt) txt.textContent = checkedItems.size + ' / ' + SHOPPING.length + ' cochés';
}

function buildBatchView() {
  const div = document.createElement('div');
  div.className = 'view';
  div.id = 'view-batch';

  let html = `
    <div class="batch-header">
      <div class="batch-title">Batch Cook</div>
      <div class="batch-sub">Deux sessions couvrent toute la semaine. Dimanche soir (~65 min) + mercredi soir (~15 min). Tout ce qui prend moins de 5 min à assembler la semaine vient d\'ici.</div>
    </div>
    <div class="batch-tip">
      💡 Conseil d\'organisation : lancer le riz et le poulet au four en même temps (ils cuisent à la même température). Pendant la cuisson, préparer le quinoa sur le feu et les bocaux d\'oats. Enchaîner les tâches = 65 min plutôt que 90 min.
    </div>
  `;

  BATCH_PLANS.forEach(session => {
    html += `
      <div class="batch-session">
        <div class="batch-session-label">${session.session}</div>
        ${session.items.map(item => `
          <div class="batch-card">
            <div class="batch-card-header">
              <div class="batch-card-title">${item.title}</div>
              <span class="batch-card-time">${item.time}</span>
            </div>
            <div class="batch-card-sub">${item.sub}</div>
            <ol class="batch-steps">
              ${item.steps.map((s, i) => `
                <li class="batch-step">
                  <span class="batch-step-num">${i + 1}</span>
                  <span class="batch-step-txt">${s}</span>
                </li>`).join('')}
            </ol>
            <div class="batch-uses">
              ${item.uses.map(u => `<span class="batch-use-tag">${u}</span>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  });

  div.innerHTML = html;
  return div;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const view = document.getElementById('view-' + id);
  const tab = document.getElementById('tab-' + id);
  if (view) view.classList.add('active');
  if (tab) tab.classList.add('active');
}

// Build day views + tabs
DAYS.forEach(day => {
  const tab = document.createElement('button');
  tab.className = 'nav-tab';
  tab.id = 'tab-' + day.id;
  tab.textContent = day.label;
  tab.onclick = () => showView(day.id);
  navTabs.appendChild(tab);
  viewContainer.appendChild(buildDayView(day));
});

const batchTab = document.createElement('button');
batchTab.className = 'nav-tab t-batch';
batchTab.id = 'tab-batch';
batchTab.textContent = 'Batch';
batchTab.onclick = () => showView('batch');
navTabs.appendChild(batchTab);
viewContainer.appendChild(buildBatchView());

const shopTab = document.createElement('button');
shopTab.className = 'nav-tab special';
shopTab.id = 'tab-shop';
shopTab.textContent = 'Courses';

navTabs.appendChild(shopTab);
viewContainer.appendChild(buildShopView());

const goalsTab = document.createElement('button');
goalsTab.className = 'nav-tab';
goalsTab.id = 'tab-goals';
goalsTab.textContent = 'Objectifs';
goalsTab.onclick = () => showView('goals');
navTabs.appendChild(goalsTab);
viewContainer.appendChild(buildGoalsView());

// Start on day 1
showView('j1');
